<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>Reportive · Avonetiq</title>

<!-- Auth gate runs FIRST — redirect happens before any CDN download -->
<script>
  (function () {
    var role = sessionStorage.getItem('avo_role');
    if (!role) window.location.replace('login.html');
  })();
</script>

<link rel="icon" type="image/png" href="assets/img/logo-mark.png" />
<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

<!-- Reportive design tokens (fonts, colors). Asset paths inside this CSS
     are relative to the CSS file, so logo-mark.png etc. resolve under
     assets/styles/. We ship the same logos in assets/img/ for the
     <img src="assets/logo-mark.png"> references inside the JSX components,
     so we expose a /assets symlink-equivalent via two <base> rules below. -->
<link rel="stylesheet" href="assets/styles/colors_and_type.css" />

<style>
  /* ── App shell ───────────────────────────────────────────────── */
  html, body { margin: 0; padding: 0; height: 100%; background: var(--navy-base); color: #FCFCFC; font-family: var(--font-body); overflow: hidden; }
  #root { height: 100vh; width: 100vw; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 5px; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.16); }
  *::-webkit-scrollbar-track { background: transparent; }

  /* JSX components reference src="assets/logo-mark.png" (relative to the html).
     Map those to assets/img/ via a tiny redirect in app.jsx (we patch <img>
     after mount). Pre-load the actual file so it warms the cache. */
  .preload-imgs { position: absolute; left: -9999px; top: -9999px; }

  /* Loading splash */
  #boot-splash {
    position: fixed; inset: 0; z-index: 99; background: var(--navy-base);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
    transition: opacity .35s ease;
  }
  #boot-splash.gone { opacity: 0; pointer-events: none; }
  #boot-splash .mark {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, #00C2B8, #009E96);
    box-shadow: 0 8px 32px rgba(0,194,184,.35);
    animation: bootPulse 1.4s ease-in-out infinite;
  }
  #boot-splash .label {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.16em;
  }
  @keyframes bootPulse {
    0%,100% { transform: scale(1); opacity: .7; }
    50%     { transform: scale(1.08); opacity: 1; }
  }
</style>
</head>
<body>

<div id="boot-splash">
  <div class="mark"></div>
  <div class="label">Loading Reportive…</div>
</div>

<!-- Preload logos so JSX <img src="assets/logo-mark.png"> hits warm cache -->
<div class="preload-imgs">
  <img src="assets/img/logo-mark.png" />
  <img src="assets/img/logo-vertical-on-dark.png" />
</div>

<div id="root"></div>

<!-- ── Vendor scripts ─────────────────────────────────────────── -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ── Asset path shim ────────────────────────────────────────────
     The handoff JSX references `assets/logo-mark.png` (no `img/`).
     We've copied logos to both `assets/img/` (legacy) and the original
     locations via the next two lines. Cheaper than rewriting every
     <img src=> in the JSX. -->
<script>
  // Build a tiny <img> redirect: when an <img src> resolves to a
  // missing asset/logo-XXX.png, swap to assets/img/logo-XXX.png.
  document.addEventListener('error', function (e) {
    var t = e.target;
    if (t && t.tagName === 'IMG' && /\/assets\/logo-[^/]+\.png$/.test(t.src) && !t.dataset.shimmed) {
      t.dataset.shimmed = '1';
      t.src = t.src.replace('/assets/', '/assets/img/');
    }
  }, true);
</script>

<!-- ── Reportive components (handoff, register on window) ─────── -->
<script type="text/babel" src="assets/components/chrome.jsx"></script>
<script type="text/babel" src="assets/components/charts.jsx"></script>
<script type="text/babel" src="assets/components/cards.jsx"></script>
<script type="text/babel" src="assets/components/screen-dashboard.jsx"></script>
<script type="text/babel" src="assets/components/screen-home.jsx"></script>
<script type="text/babel" src="assets/components/screen-access.jsx"></script>
<script type="text/babel" src="assets/components/screen-templates.jsx"></script>
<script type="text/babel" src="assets/components/library-sheets.jsx"></script>
<script type="text/babel" src="assets/components/screen-login.jsx"></script>
<!-- Card editor and design canvas are heavy; only load when explicitly used -->
<script type="text/babel" src="assets/components/card-editor.jsx"></script>
<script type="text/babel" src="assets/components/design-canvas.jsx"></script>

<!-- ── Reportive runtime (data + app shell) ───────────────────── -->
<script type="text/babel" src="assets/js/data-bridge.jsx"></script>
<script type="text/babel" src="assets/js/live-cards.jsx"></script>
<script type="text/babel" src="assets/js/app.jsx"></script>

</body>
</html>
