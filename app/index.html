<!DOCTYPE html>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>Reportive · Avonetiq</title>

<!-- Auth gate runs FIRST — redirect happens before any CDN download -->
<script>
  (function () {
    var hash = window.location.hash || '';
    if (hash.indexOf('#share/') === 0) {
      sessionStorage.setItem('avo_role', 'viewer');
      return;
    }
    var role = sessionStorage.getItem('avo_role');
    if (!role) window.location.replace('login.html');
  })();
</script>

<link rel="icon" type="image/png" href="assets/img/logo-mark.png" id="favicon-link" />
<script>
  // Favicon: crop transparent padding so mark fills the icon, no background
  (function () {
    var img = new Image();
    img.onload = function () {
      var size = 128;
      var c = document.createElement('canvas');
      c.width = c.height = size;
      var ctx = c.getContext('2d');
      // Crop ~20% transparent padding from each side so the mark fills the icon fully
      var pad = Math.round(img.width * 0.20);
      var inner = img.width - pad * 2;
      ctx.drawImage(img, pad, pad, inner, inner, 0, 0, size, size);
      var link = document.getElementById('favicon-link');
      link.type = 'image/png';
      link.href = c.toDataURL('image/png');
    };
    img.src = 'assets/img/logo-mark.png';
  })();
</script>
<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

<!-- Reportive design tokens (fonts, colors). Asset paths inside this CSS
     are relative to the CSS file, so logo-mark.png etc. resolve under
     assets/styles/. We ship the same logos in assets/img/ for the
     <img src="assets/logo-mark.png"> references inside the JSX components,
     so we expose a /assets symlink-equivalent via two <base> rules below. -->
<link rel="stylesheet" href="assets/styles/colors_and_type.css" />

<style>
  /* ── App shell ───────────────────────────────────────────────── */
  html, body { margin: 0; padding: 0; height: 100%; background: var(--navy-base); color: #FCFCFC; font-family: var(--font-body); overflow: hidden; }
  #root { height: 100vh; width: 100vw; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 5px; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.16); }
  *::-webkit-scrollbar-track { background: transparent; }

  /* JSX components reference src="assets/logo-mark.png" (relative to the html).
     Map those to assets/img/ via a tiny redirect in app.jsx (we patch <img>
     after mount). Pre-load the actual file so it warms the cache. */
  .preload-imgs { position: absolute; left: -9999px; top: -9999px; }

  /* Loading splash */
  #boot-splash {
    position: fixed; inset: 0; z-index: 99; background: var(--navy-base);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
    transition: opacity .35s ease;
  }
  #boot-splash.gone { opacity: 0; pointer-events: none; }
  #boot-splash .mark {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, #00C2B8, #009E96);
    box-shadow: 0 8px 32px rgba(0,194,184,.35);
    animation: bootPulse 1.4s ease-in-out infinite;
  }
  #boot-splash .label {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.16em;
  }
  @keyframes bootPulse {
    0%,100% { transform: scale(1); opacity: .7; }
    50%     { transform: scale(1.08); opacity: 1; }
  }
  @keyframes savedFlashAnim {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.88); }
    10%  { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
    72%  { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
  }
</style>
</head>
<body>

<div id="boot-splash">
  <div class="mark"></div>
  <div class="label" id="boot-label">Loading Reportive…</div>
</div>

<script>
  // Catch script-level errors (e.g. Babel compile failures) before React starts
  window.addEventListener('error', function(e) {
    var label = document.getElementById('boot-label');
    if (label) {
      label.innerHTML = 'Script Error: ' + (e.message || 'unknown') +
        '<br><span style="font-size:9px;opacity:.5;">' + (e.filename || '') + ':' + (e.lineno || '') + '</span>' +
        '<br><span style="font-size:9px;opacity:.4;">Open DevTools (F12) → Console for details.</span>';
      label.style.maxWidth = '400px';
      label.style.lineHeight = '1.6';
      label.style.color = '#E3170A';
    }
    var splash = document.getElementById('boot-splash');
    if (splash) {
      var mark = splash.querySelector('.mark');
      if (mark) { mark.style.animationPlayState = 'paused'; mark.style.opacity = '0.2'; }
    }
  });

  // If app hasn't mounted after 8s, show a helpful error instead of spinning forever
  setTimeout(function() {
    var root = document.getElementById('root');
    var splash = document.getElementById('boot-splash');
    var label = document.getElementById('boot-label');
    if (splash && !splash.classList.contains('gone') && root && !root.hasChildNodes()) {
      label.innerHTML = 'Unable to load the app.<br><span style="font-size:10px;opacity:.6;">Serve via a local server: <a href="http://localhost:3100/index.html" style="color:#00C2B8;">http://localhost:3100</a></span>';
      label.style.maxWidth = '320px';
      label.style.lineHeight = '1.6';
      document.querySelector('#boot-splash .mark').style.animationPlayState = 'paused';
      document.querySelector('#boot-splash .mark').style.opacity = '0.3';
    }
  }, 8000);
</script>

<!-- Preload logos so JSX <img src="assets/logo-mark.png"> hits warm cache -->
<div class="preload-imgs">
  <img src="assets/img/logo-mark.png" />
  <img src="assets/img/logo-vertical-on-dark.png" />
</div>

<div id="root"></div>

<!-- ── Vendor scripts ─────────────────────────────────────────── -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>

<!-- ── Asset path shim ────────────────────────────────────────────
     The handoff JSX references `assets/logo-mark.png` (no `img/`).
     We've copied logos to both `assets/img/` (legacy) and the original
     locations via the next two lines. Cheaper than rewriting every
     <img src=> in the JSX. -->
<script>
  // Build a tiny <img> redirect: when an <img src> resolves to a
  // missing asset/logo-XXX.png, swap to assets/img/logo-XXX.png.
  document.addEventListener('error', function (e) {
    var t = e.target;
    if (t && t.tagName === 'IMG' && /\/assets\/logo-[^/]+\.png$/.test(t.src) && !t.dataset.shimmed) {
      t.dataset.shimmed = '1';
      t.src = t.src.replace('/assets/', '/assets/img/');
    }
  }, true);
</script>
