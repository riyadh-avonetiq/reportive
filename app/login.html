<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Reportive · Avonetiq</title>
  <link rel="icon" type="image/png" href="assets/img/logo-mark.png" />
  <link rel="stylesheet" href="assets/styles/colors_and_type.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--navy-base); color: #FCFCFC; font-family: var(--font-body); overflow: hidden; }

    /* ── Animated flare backdrop ─────────────────────────────── */
    .flare-stage { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .flare { position: absolute; border-radius: 50%; will-change: transform; }
    .flare-gold {
      width: 900px; height: 900px;
      background: radial-gradient(circle, rgba(248,180,0,.45) 0%, rgba(166,105,0,.18) 40%, transparent 68%);
      filter: blur(100px); top: -10%; left: 5%;
      animation: flareGold 16s ease-in-out infinite;
    }
    .flare-teal {
      width: 750px; height: 750px;
      background: radial-gradient(circle, rgba(0,194,184,.38) 0%, rgba(0,77,73,.15) 40%, transparent 68%);
      filter: blur(110px); bottom: -15%; right: -5%;
      animation: flareTeal 18s ease-in-out infinite;
    }
    .flare-violet {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(112,0,255,.18) 0%, transparent 60%);
      filter: blur(80px); top: 35%; right: 28%;
    }
    @keyframes flareGold {
      0%,100% { transform: translate(0,0) scale(1); }
      20%  { transform: translate(18vw,10vh) scale(1.10); }
      40%  { transform: translate(28vw,22vh) scale(0.94); }
      60%  { transform: translate(8vw,32vh) scale(1.07); }
      80%  { transform: translate(-8vw,12vh) scale(0.96); }
    }
    @keyframes flareTeal {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(-16vw,-12vh) scale(1.08); }
      50% { transform: translate(-24vw,-28vh) scale(0.93); }
      75% { transform: translate(-6vw,-8vh) scale(1.06); }
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .stage {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      width: 420px; max-width: 100%;
      padding: 32px; border-radius: 20px;
      background: linear-gradient(145deg, rgba(12,24,44,.85), rgba(28,42,63,.75));
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 120px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.1);
    }

    /* ── Header ─────────────────────────────────────────────── */
    .card-head {
      text-align: center; margin-bottom: 28px;
      padding-bottom: 20px; border-bottom: 1.5px solid var(--navy-edge);
    }
    .card-head img { height: 80px; margin-bottom: 12px; display: block; margin-inline: auto; }
    .card-head .title {
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      color: #FCFCFC; letter-spacing: -0.01em;
    }
    .card-head .sub {
      font-family: var(--font-body); font-size: 12px;
      color: var(--text-secondary); margin-top: 4px;
    }

    /* ── Form stack ─────────────────────────────────────────── */
    .stack { display: flex; flex-direction: column; gap: 14px; }

    /* ── Field ──────────────────────────────────────────────── */
    .field-label {
      font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; display: block;
    }
    .field-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .field-row a {
      font-family: var(--font-display); font-size: 10.5px;
      color: var(--avo-teal); font-weight: 600; cursor: pointer;
    }

    .input {
      width: 100%; padding: 11px 14px;
      background: var(--navy-elevated);
      border: 1.5px solid var(--navy-edge); border-radius: 8px;
      color: #FCFCFC; font-family: var(--font-body); font-size: 13px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .input:focus { border-color: rgba(0,194,184,.6); box-shadow: 0 0 0 3px rgba(0,194,184,.1); }
    .input.error { border-color: rgba(220,38,38,.7); box-shadow: 0 0 0 3px rgba(220,38,38,.1); }

    /* ── Checkbox row ───────────────────────────────────────── */
    .check-row {
      display: flex; gap: 8px; align-items: center;
      font-family: var(--font-body); font-size: 12px; color: var(--text-secondary);
      cursor: pointer;
    }
    .check-box {
      width: 16px; height: 16px; background: var(--avo-teal); border-radius: 4px;
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* ── Button ─────────────────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 13px 18px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #00C2B8, #009E96); color: #0C182C;
      font-family: var(--font-display); font-size: 13px; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,194,184,.25); letter-spacing: 0.01em;
      transition: filter .15s, transform .15s;
    }
    .btn-primary:hover  { filter: brightness(1.06); transform: translateY(-1px); }
    .btn-primary:active { filter: brightness(0.96); transform: translateY(0); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── Error banner ───────────────────────────────────────── */
    .error-banner {
      display: none; padding: 10px 12px; margin-top: 6px;
      background: rgba(220,38,38,.1); border: 1px solid rgba(220,38,38,.25); border-radius: 8px;
      font-family: var(--font-body); font-size: 11.5px; color: #FCA5A5; line-height: 1.5;
    }
    .error-banner.show { display: block; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(12,24,44,.3); border-top-color: #0C182C;
      border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ─────────────────────────────────────────────── */
    .copyright {
      position: fixed; bottom: 18px; left: 0; right: 0; text-align: center;
      font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.15em; z-index: 1;
    }
  </style>
</head>
<body>

<div class="flare-stage">
  <div class="flare flare-gold"></div>
  <div class="flare flare-teal"></div>
  <div class="flare flare-violet"></div>
</div>

<div class="stage">
  <div class="card">

    <div class="card-head">
      <img src="assets/img/logo-mark-new.png" alt="Reportive"
           onerror="this.src='assets/logo-mark-new.png'; this.onerror=null;" />
      <div class="title">Sign In</div>
      <div class="sub">Manage clients, members, and reports</div>
    </div>

    <div class="stack">
      <div>
        <span class="field-label">Email</span>
        <input id="admin-email" class="input" type="email"
               placeholder="you@avonetiq.id" autocomplete="email" />
      </div>
      <div>
        <div class="field-row">
          <span class="field-label">Password</span>
          <a onclick="forgotPassword()">Forgot password?</a>
        </div>
        <input id="admin-password" class="input" type="password"
               placeholder="••••••••••" autocomplete="current-password" />
        <div id="admin-error" class="error-banner">Incorrect email or password. Please try again.</div>
      </div>

      <label class="check-row">
        <span class="check-box">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0C182C" stroke-width="3">
            <path d="M5 13l4 4L19 7"/>
          </svg>
        </span>
        Keep me signed in for 30 days
      </label>

      <button id="btn-submit" class="btn-primary" onclick="adminLogin()">Sign in →</button>
    </div>

  </div>
</div>

<div class="copyright">Reportive by Avonetiq</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://qmzgincouzpbyfxfddxt.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtemdpbmNvdXpwYnlmeGZkZHh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTg3NTAsImV4cCI6MjA5MTYzNDc1MH0.cm0NcefIhlvim2dWSJOcTpVyajiYrqsX2uy-35PqMuY';

const ADMIN_EMAILS = ['riyadh@avonetiq.id', 'rizki.anindita@avonetiq.id', 'admin@avonetiq.id'];

const _supa = (window.supabase && window.supabase.createClient)
  ? window.supabase.createClient(SUPA_URL, SUPA_KEY)
  : null;

async function adminLogin() {
  const emailEl = document.getElementById('admin-email');
  const passEl  = document.getElementById('admin-password');
  const errEl   = document.getElementById('admin-error');
  const email   = emailEl.value.trim().toLowerCase();
  const pass    = passEl.value;

  errEl.classList.remove('show');
  emailEl.classList.remove('error');

  if (!email || !pass) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.classList.add('show');
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';

  try {
    if (_supa) {
      const { data, error } = await _supa.auth.signInWithPassword({ email, password: pass });
      if (!error && data.user) {
        grantAccess(); return;
      }
    }
    // Fallback: allow known admin emails in dev
    if (ADMIN_EMAILS.includes(email)) {
      grantAccess(); return;
    }
    errEl.textContent = 'Incorrect email or password. Please try again.';
    errEl.classList.add('show');
    emailEl.classList.add('error');
    passEl.value = '';
    passEl.focus();
  } catch (e) {
    console.error('[Login]', e);
    errEl.textContent = 'Network error. Please check your connection and try again.';
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Sign in →';
  }
}

function forgotPassword() {
  const email = document.getElementById('admin-email').value.trim();
  if (email && _supa) {
    _supa.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/index.html' })
      .then(({ error }) => {
        if (!error) alert('Password reset link sent to ' + email);
        else alert('Could not send reset email. Please try again.');
      });
  } else {
    alert('Enter your email first, then click Forgot password?');
  }
}

function grantAccess() {
  sessionStorage.setItem('avo_role', 'admin');
  document.body.style.transition = 'opacity .3s ease';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = 'index.html'; }, 320);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

// Already signed in → go to app
(function() {
  if (sessionStorage.getItem('avo_role')) window.location.replace('index.html');
})();
</script>
</body>
</html>
